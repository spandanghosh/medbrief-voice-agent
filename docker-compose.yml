version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: medbrief_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file: .env
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: medbrief_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: medbrief_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    env_file: .env
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: medbrief_gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: medbrief_agent
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import aio_pika, redis.asyncio, motor; print('deps ok')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: medbrief_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rabbitmq_data:
  redis_data:
  mongo_data:
