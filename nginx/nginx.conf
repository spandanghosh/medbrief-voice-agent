# MedBrief reverse proxy + static file server
# Routes all /voice, /chat, /tts, /health calls to the FastAPI gateway.
# Serves the frontend SPA from /usr/share/nginx/html.

upstream gateway {
    server gateway:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Increase timeouts to cover STT + LLM + TTS round-trip (can be 20-30 s)
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # Forward real client IP to FastAPI
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Use HTTP/1.1 keep-alive to the upstream
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # ── /voice — audio upload in, MP3 stream out ─────────────────────────────
    location /voice {
        proxy_pass http://gateway;
        client_max_body_size 10M;
        # Disable buffering so the browser receives audio chunks immediately
        proxy_buffering  off;
        proxy_cache      off;
        # Expose custom response headers to the browser (CORS)
        add_header Access-Control-Expose-Headers "X-Session-Id, X-Response-Text, X-User-Text" always;
    }

    # ── /chat — text-only endpoint ────────────────────────────────────────────
    location /chat {
        proxy_pass http://gateway;
        client_max_body_size 1M;
    }

    # ── /tts — streaming MP3 response ─────────────────────────────────────────
    location /tts {
        proxy_pass http://gateway;
        proxy_buffering off;
        proxy_cache     off;
    }

    # ── /health — gateway liveness (also used by nginx own healthcheck) ───────
    location /health {
        proxy_pass  http://gateway;
        access_log  off;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # Serve index.html for unknown paths (SPA routing)
        try_files $uri $uri/ /index.html;

        # Cache JS/CSS/images for 1 h
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }
    }
}
